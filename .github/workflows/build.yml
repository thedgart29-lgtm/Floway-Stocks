name: Build/Release Electron App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build React frontend
        run: npm run build

      - name: Prepare macOS Signing
        if: matrix.os == 'macos-latest' && env.CSC_LINK != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build and Publish Electron App
        run: npm run electron:build -- --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ env.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Skip signing if CSC_LINK is empty to prevent macOS build crash
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ env.CSC_LINK != '' }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Pixivo-Build-${{ matrix.os }}
          path: |
            dist_electron/*.exe
            dist_electron/*.dmg
            dist_electron/*.zip
            dist_electron/*.blockmap
            dist_electron/latest*.yml
